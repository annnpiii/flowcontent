version: "2"
type: backend
tech_stack:
  - JavaScript (Node.js)
  - Express.js
  - SQLite (sql.js)
  - bcryptjs
  - Multer
  - express-session
  - express-rate-limit
  - node-cron
  - UUID
features:
  - name: Authentication
    description: User login, logout, and session management with role-based access
    files:
      - server.js
    endpoints:
      - method: POST
        path: /api/login
        description: Authenticate user with username/password, create session
        auth_required: false
        response_schema:
          "200": "{ user, brands, activeBrandId }"
          "401": "{ error }"
      - method: POST
        path: /api/logout
        description: Destroy user session
        auth_required: true
        response_schema:
          "200": "{ ok: true }"
      - method: GET
        path: /api/me
        description: Get current user's profile, brands, and active brand
        auth_required: true
        response_schema:
          "200": "{ user, brands, activeBrandId }"
          "401": "{ error: 'No session' }"
    depends_on:
      - Database
  - name: User Management
    description: Admin CRUD operations for user accounts with permissions management
    files:
      - server.js
    endpoints:
      - method: GET
        path: /api/users
        description: List all users (admin only)
        auth_required: true
        response_schema:
          "200": "{ users: User[] }"
      - method: POST
        path: /api/users
        description: Create a new user (admin only)
        auth_required: true
        request_schema:
          body:
            username: string
            password: string
            display_name: string
            role: string
        response_schema:
          "200": "{ ok: true }"
          "400": "{ error: 'Username already exists' }"
      - method: DELETE
        path: /api/users/:id
        description: Delete a user (admin only)
        auth_required: true
        response_schema:
          "200": "{ ok: true }"
          "404": "{ error: 'User not found' }"
      - method: GET
        path: /api/users/:id/permissions
        description: Get user permissions (admin only)
        auth_required: true
        response_schema:
          "200": "{ permissions }"
      - method: PUT
        path: /api/users/:id/permissions
        description: Update user permissions (admin only)
        auth_required: true
        request_schema:
          body:
            permissions: string[]
        response_schema:
          "200": "{ ok: true }"
    depends_on:
      - Authentication
      - Database
  - name: Content Calendar
    description: CRUD operations for social media content with status workflow (draft, pending_review, approved, scheduled, posted)
    files:
      - server.js
    endpoints:
      - method: GET
        path: /api/contents
        description: List contents with filtering by date range, status, platform, creator
        auth_required: true
        response_schema:
          "200": "{ contents: Content[] }"
      - method: GET
        path: /api/contents/:id
        description: Get content details with activity logs and version history
        auth_required: true
        response_schema:
          "200": "{ content, logs, versions }"
          "404": "{ error: 'Not found' }"
      - method: POST
        path: /api/contents
        description: Create a new content draft
        auth_required: true
        request_schema:
          body:
            title: string
            caption: string
            platform: string
            posting_date: string
            posting_time: string
        response_schema:
          "200": "{ id, ok: true }"
      - method: PUT
        path: /api/contents/:id
        description: Update content and create version history
        auth_required: true
        response_schema:
          "200": "{ ok: true }"
          "404": "{ error: 'Not found' }"
      - method: PUT
        path: /api/contents/:id/status
        description: Update content status with notification triggers
        auth_required: true
        response_schema:
          "200": "{ ok: true }"
      - method: PUT
        path: /api/contents/:id/schedule
        description: Schedule content with posting date/time (admin only)
        auth_required: true
        response_schema:
          "200": "{ ok: true }"
      - method: PUT
        path: /api/contents/:id/date
        description: Change content posting date (restricted for scheduled/posted)
        auth_required: true
        response_schema:
          "200": "{ ok: true }"
          "403": "{ error: 'Cannot move scheduled/posted' }"
      - method: DELETE
        path: /api/contents/bulk
        description: Bulk delete contents (admin only)
        auth_required: true
        request_schema:
          body:
            ids: string[]
        response_schema:
          "200": "{ success: true, deleted: number }"
      - method: PATCH
        path: /api/contents/bulk/status
        description: Bulk update content status (admin only)
        auth_required: true
        request_schema:
          body:
            ids: string[]
            status: string
        response_schema:
          "200": "{ success: true, updated: number }"
      - method: DELETE
        path: /api/contents/:id
        description: Delete a single content (admin only)
        auth_required: true
        response_schema:
          "200": "{ ok: true }"
    depends_on:
      - Authentication
      - Brand Management
      - Notifications
  - name: Brand Management
    description: Multi-brand support with member roles and brand switching
    files:
      - server.js
      - database.js
    endpoints:
      - method: GET
        path: /api/brands
        description: List brands accessible by current user
        auth_required: true
        response_schema:
          "200": "{ brands: Brand[] }"
      - method: POST
        path: /api/brands
        description: Create a new brand (admin only)
        auth_required: true
        request_schema:
          body:
            name: string
            description: string
            color: string
        response_schema:
          "200": "{ id, ok: true }"
      - method: PUT
        path: /api/brands/:id
        description: Update brand details (admin only)
        auth_required: true
        response_schema:
          "200": "{ ok: true }"
      - method: POST
        path: /api/brands/:id/logo
        description: Upload brand logo (admin only)
        auth_required: true
        response_schema:
          "200": "{ ok: true, logo_url }"
      - method: DELETE
        path: /api/brands/:id
        description: Delete brand and its members (admin only)
        auth_required: true
        response_schema:
          "200": "{ ok: true }"
      - method: POST
        path: /api/brand/switch
        description: Switch active brand context
        auth_required: true
        request_schema:
          body:
            brand_id: string
        response_schema:
          "200": "{ ok: true, activeBrandId }"
      - method: GET
        path: /api/brands/:id/members
        description: List brand members (admin only)
        auth_required: true
        response_schema:
          "200": "{ members }"
      - method: POST
        path: /api/brands/:id/members
        description: Add member to brand (admin only)
        auth_required: true
        response_schema:
          "200": "{ ok: true }"
      - method: DELETE
        path: /api/brands/:id/members/:userId
        description: Remove member from brand (admin only)
        auth_required: true
        response_schema:
          "200": "{ ok: true }"
    depends_on:
      - Authentication
      - Database
  - name: Content Plans
    description: Content planning with calendar sync, bulk import/export, and AI analysis
    files:
      - server.js
      - database.js
    endpoints:
      - method: GET
        path: /api/content-plans
        description: List content plans with pagination and filtering
        auth_required: true
        response_schema:
          "200": "{ plans, total, page, limit }"
      - method: POST
        path: /api/content-plans
        description: Create content plan and sync to calendar
        auth_required: true
        response_schema:
          "200": "{ id }"
      - method: PUT
        path: /api/content-plans/:id
        description: Update content plan and sync to calendar
        auth_required: true
        response_schema:
          "200": "{ success: true }"
      - method: DELETE
        path: /api/content-plans/bulk
        description: Bulk delete plans and synced contents (admin only)
        auth_required: true
        response_schema:
          "200": "{ success: true, deleted: number }"
      - method: PATCH
        path: /api/content-plans/bulk/status
        description: Bulk update plan status (admin only)
        auth_required: true
        response_schema:
          "200": "{ success: true, updated: number }"
      - method: DELETE
        path: /api/content-plans/:id
        description: Delete a plan and its synced content (admin only)
        auth_required: true
        response_schema:
          "200": "{ success: true }"
      - method: GET
        path: /api/content-plans/export
        description: Export all plans as CSV
        auth_required: true
        response_schema:
          "200": "CSV file"
      - method: POST
        path: /api/content-plans/import
        description: Import plans from CSV (admin only)
        auth_required: true
        response_schema:
          "200": "{ count, ids }"
      - method: GET
        path: /api/content-plans/months
        description: Get distinct month groups
        auth_required: true
        response_schema:
          "200": "{ months: string[] }"
    depends_on:
      - Authentication
      - Brand Management
      - Content Calendar
  - name: Content Hub
    description: Folder-based content item management with file uploads
    files:
      - server.js
    endpoints:
      - method: GET
        path: /api/folders
        description: List content folders with item counts
        auth_required: true
        response_schema:
          "200": "{ folders }"
      - method: POST
        path: /api/folders
        description: Create a new folder
        auth_required: true
        response_schema:
          "200": "{ id, ok: true }"
      - method: DELETE
        path: /api/folders/:id
        description: Delete a folder (admin only, non-default)
        auth_required: true
        response_schema:
          "200": "{ ok: true }"
      - method: GET
        path: /api/items
        description: List content items with pagination and search
        auth_required: true
        response_schema:
          "200": "{ items, total, page }"
      - method: POST
        path: /api/items
        description: Create content item with file upload
        auth_required: true
        response_schema:
          "200": "{ id, ok: true }"
      - method: DELETE
        path: /api/items/:id
        description: Delete content item (admin only)
        auth_required: true
        response_schema:
          "200": "{ ok: true }"
    depends_on:
      - Authentication
      - Brand Management
  - name: Promo Management
    description: Promo/branch allocation management with subsidy calculations
    files:
      - server.js
    endpoints:
      - method: GET
        path: /api/promos
        description: List all promos
        auth_required: true
        response_schema:
          "200": "{ promos }"
      - method: POST
        path: /api/promos
        description: Create a new promo (admin only)
        auth_required: true
        response_schema:
          "200": "{ id, ok: true }"
          "400": "{ error: 'Allocation must total 100%' }"
      - method: PUT
        path: /api/promos/:id
        description: Update a promo (admin only)
        auth_required: true
        response_schema:
          "200": "{ ok: true }"
    depends_on:
      - Authentication
      - Brand Management
  - name: Trending Topics & AI Generator
    description: AI-powered trend generation via DeepSeek API with manual trend CRUD
    files:
      - server.js
    endpoints:
      - method: POST
        path: /api/trends/refresh
        description: Generate new trends via DeepSeek AI (admin only)
        auth_required: true
        response_schema:
          "200": "{ count }"
          "500": "{ error }"
      - method: GET
        path: /api/trends
        description: List trends with platform/relevance/category filters
        auth_required: true
        response_schema:
          "200": "{ trends }"
      - method: POST
        path: /api/trends
        description: Create a manual trend entry
        auth_required: true
        response_schema:
          "200": "{ id, ok: true }"
      - method: PUT
        path: /api/trends/:id
        description: Update trend relevance/notes
        auth_required: true
        response_schema:
          "200": "{ ok: true }"
      - method: POST
        path: /api/trends/batch-draft
        description: Create content drafts from selected trends
        auth_required: true
        response_schema:
          "200": "{ ids, ok: true }"
    depends_on:
      - Authentication
      - Brand Management
      - DeepSeek API (external)
  - name: Notifications
    description: User notification system with read/unread tracking
    files:
      - server.js
    endpoints:
      - method: GET
        path: /api/notifications
        description: List user notifications with unread count
        auth_required: true
        response_schema:
          "200": "{ notifications, unread }"
      - method: PUT
        path: /api/notifications/:id/read
        description: Mark notification as read
        auth_required: true
        response_schema:
          "200": "{ ok: true }"
      - method: PUT
        path: /api/notifications/read-all
        description: Mark all notifications as read
        auth_required: true
        response_schema:
          "200": "{ ok: true }"
      - method: DELETE
        path: /api/notifications/:id
        description: Delete a notification
        auth_required: true
        response_schema:
          "200": "{ ok: true }"
      - method: DELETE
        path: /api/notifications
        description: Delete all user notifications
        auth_required: true
        response_schema:
          "200": "{ ok: true, deleted }"
    depends_on:
      - Authentication
      - Database
  - name: Dashboard & Analytics
    description: Dashboard KPIs and reporting with AI analysis
    files:
      - server.js
    endpoints:
      - method: GET
        path: /api/dashboard
        description: Get content status counts (drafts, pending, approved, etc.)
        auth_required: true
        response_schema:
          "200": "{ drafts, pendingReview, approved, revisionRequested, scheduled, posted }"
      - method: GET
        path: /api/report
        description: Get content performance report with date filter (admin only)
        auth_required: true
        response_schema:
          "200": "{ totalPosts, posted, draft, pendingReview, scheduled, contents }"
      - method: POST
        path: /api/report/ai-analyze
        description: AI-powered content performance analysis (admin only)
        auth_required: true
        response_schema:
          "200": "{ analysis, rawData }"
    depends_on:
      - Authentication
      - Brand Management
      - DeepSeek API (external)
  - name: Canva Templates
    description: Canva design template link management
    files:
      - server.js
    endpoints:
      - method: GET
        path: /api/canva-templates
        description: List Canva templates
        auth_required: true
        response_schema:
          "200": "{ templates }"
      - method: POST
        path: /api/canva-templates
        description: Create a Canva template reference
        auth_required: true
        response_schema:
          "200": "{ id }"
      - method: PUT
        path: /api/canva-templates/:id
        description: Update Canva template
        auth_required: true
        response_schema:
          "200": "{ success: true }"
      - method: DELETE
        path: /api/canva-templates/:id
        description: Delete Canva template
        auth_required: true
        response_schema:
          "200": "{ success: true }"
      - method: POST
        path: /api/canva-templates/:id/thumbnail
        description: Upload thumbnail for Canva template
        auth_required: true
        response_schema:
          "200": "{ ok: true, thumbnail_url }"
    depends_on:
      - Authentication
      - Brand Management
  - name: File Upload
    description: Generic file upload for content media
    files:
      - server.js
    endpoints:
      - method: POST
        path: /api/upload
        description: Upload a file
        auth_required: true
        response_schema:
          "200": "{ url, name }"
          "400": "{ error: 'No file' }"
    depends_on:
      - Authentication
  - name: Activity Logs & Search
    description: Global search and activity logging
    files:
      - server.js
    endpoints:
      - method: GET
        path: /api/search
        description: Global search across plans, contents, items, and promos
        auth_required: true
        response_schema:
          "200": "{ results }"
      - method: GET
        path: /api/activities
        description: Get recent activity logs
        auth_required: true
        response_schema:
          "200": "{ logs }"
      - method: GET
        path: /api/team
        description: List team members
        auth_required: true
        response_schema:
          "200": "{ users }"
    depends_on:
      - Authentication
      - Brand Management
  - name: Templates (Asset Generator)
    description: Design templates for social media content
    files:
      - server.js
      - database.js
    endpoints:
      - method: GET
        path: /api/templates
        description: List templates with category filter
        auth_required: true
        response_schema:
          "200": "{ templates }"
      - method: DELETE
        path: /api/templates/:id
        description: Delete a template
        auth_required: true
        response_schema:
          "200": "{ success: true }"
    depends_on:
      - Authentication
      - Brand Management
known_limitations:
  - issue: DeepSeek API key may be missing from environment
    location: server.js:527-529
    impact: Trend generator and AI analysis features will fail
  - issue: No input validation on many POST/PUT endpoints
    location: server.js
    impact: Invalid or missing data accepted without proper error messages
  - issue: Rate limiting only applied to login endpoint
    location: server.js:44-51
    impact: Other API endpoints vulnerable to abuse
  - issue: SQLite database is file-based, no concurrency protection
    location: database.js
    impact: Potential data corruption under concurrent writes
  - issue: Session secret hardcoded as fallback
    location: server.js:54
    impact: Security risk if SESSION_SECRET env var not set
  - issue: CORS not configured
    location: server.js
    impact: Only same-origin requests work
